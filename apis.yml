description: >-
  Colgate-Palmolive Company is a global consumer-products manufacturer
  operating in oral care, personal care, home care, and pet nutrition through
  brands such as Colgate, Palmolive, Hill's Pet Nutrition, Speed Stick, Ajax,
  and Softsoap. Colgate-Palmolive does not publish a general-purpose public
  developer REST API. Its B2B integration footprint is centered on EDI
  exchanges with retail trading partners (X12 messages, AS2, VAN), supplier
  integrations through SAP Ariba, and internal corporate systems. There is
  also a corporate sustainability and ESG reporting surface, but it is not
  exposed as a developer API.
